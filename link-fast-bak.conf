server {
    listen 80;
    server_name 112.124.51.99; # 后期可追加域名：link-fast.cn www.link-fast.cn

    # 1. 全局日志与基础设置
    access_log /var/log/nginx/link-fast_access.log;
    error_log /var/log/nginx/link-fast_error.log;

    # 2. 前端静态资源 (匹配 / )
    # 优先级最低，处理所有非 /api/ 开头的请求（如网页、js、css等）
    location / {
        root /var/www/linkfast-admin;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # 支持 Vue/React History 路由
    }

    # 3. 后端回调接口 (最高优先级)
    # 精确匹配，处理回调，强制 POST
    location = /api/callback/notify {
        limit_except POST {
            deny all;
        }
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 4. 后端核心业务接口 (中等优先级)
    # 匹配 /api/ 开头的请求
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS 跨域配置
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 5. 静态资源缓存策略
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        root /var/www/linkfast-admin;
        expires 7d;
    }

    # 6. 安全加固
    location ~ ^/(manager|host-manager|docs|examples) {
        deny all;
    }

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/javascript application/json;
}