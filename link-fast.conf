server {
    listen 80;
    server_name 112.124.51.99;

    # 日志记录，便于后续分析调用情况
    access_log /var/log/nginx/link-fast_access.log;
    error_log /var/log/nginx/link-fast_error.log;

    # 1. 屏蔽敏感目录扫描，提升系统安全性
    location ~ ^/(manager|host-manager|docs|examples) {
        deny all;
    }

    # 2. 回调接口独立处理 (精准匹配 POST)
    location = /api/callback/notify {
            # 只允许 POST 方法，否则返回 405
            limit_except POST {
                deny all;
            }
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
             # 设置超时，防止回调处理慢导致连接堆积
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

    # 3. 核心业务与回调统一接口处理
    location /api/ {
        # 转发至本地 Tomcat，末尾不加斜杠以保留 /api 路径前缀
        proxy_pass http://127.0.0.1:8080;

        # 传递客户端真实 IP 等信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- CORS 跨域配置 ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

        # 处理浏览器的预检请求 (OPTIONS)，快速响应
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 设置超时，防止回调处理慢导致连接堆积
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 4. 拦截根路径请求，防止直接访问
    location / {
        return 404;
    }
}